<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diyarshow - Next Gen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;900&display=swap');

        :root {
            --cyan-plasma: #00f2ea;
            --carbon-black: #0a0a0c;
            --glass-white: rgba(255, 255, 255, 0.07);
        }

        body {
            margin: 0;
            background: var(--carbon-black);
            font-family: 'Noto Sans Arabic', sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Moving Mesh Background */
        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(at 0% 0%, rgba(0, 242, 234, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(112, 0, 255, 0.15) 0px, transparent 50%);
            z-index: -1;
        }

        .main-card {
            width: 90%;
            max-width: 400px;
            background: linear-gradient(145deg, #16161a, #0a0a0c);
            border-radius: 50px;
            position: relative;
            padding: 40px 25px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        /* --- THE BIG "D" LOGO --- */
        .brand-emblem {
            width: 100px;
            height: 100px;
            background: var(--carbon-black);
            border: 4px solid var(--cyan-plasma);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; /* Organic Shape */
            margin: -90px auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            font-weight: 900;
            color: var(--cyan-plasma);
            box-shadow: 0 0 30px rgba(0, 242, 234, 0.4);
            animation: morph 6s linear infinite alternate;
        }

        @keyframes morph {
            0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; transform: rotate(0deg); }
            100% { border-radius: 50% 50% 20% 80% / 25% 80% 20% 75%; transform: rotate(5deg); }
        }

        h1 {
            font-size: 42px;
            margin: 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- STACKED LIST ITEMS --- */
        .feature-stack {
            margin: 30px 0;
        }

        .feature-box {
            background: var(--glass-white);
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .feature-box:hover {
            border-color: var(--cyan-plasma);
            background: rgba(0, 242, 234, 0.05);
            transform: translateX(-10px);
        }

        .feature-box i {
            font-size: 20px;
            color: var(--cyan-plasma);
        }

        /* --- CONTACT RADAR --- */
        .phone-radar {
            display: block;
            text-decoration: none;
            background: var(--cyan-plasma);
            color: #000;
            padding: 20px;
            border-radius: 25px;
            font-weight: 900;
            font-size: 22px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .phone-radar:active { transform: scale(0.95); }

        /* --- CIRCLE SOCIALS --- */
        .social-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .icon-circle {
            width: 55px;
            height: 55px;
            background: var(--glass-white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #fff;
            text-decoration: none;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .icon-circle:hover {
            background: #fff;
            color: #000;
            transform: translateY(-5px);
        }

        .tagline {
            font-size: 10px;
            color: #444;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="mesh-bg"></div>

<div class="main-card">
    <div class="brand-emblem">D</div>
    
    <h1>DIYARSHOW</h1>
    <p style="color:#888; margin-top:5px;">Professional Digital Solutions</p>

    <div class="feature-stack">
        <div class="feature-box">
            <i class="fa-solid fa-bolt"></i>
            <span>خزمەتگۆزاریێن خێرا و سەردەم</span>
        </div>
        <div class="feature-box">
            <i class="fa-solid fa-microchip"></i>
            <span>باشترین تەکنەلۆژیا د دەستێن تە دا</span>
        </div>
    </div>

    <a href="tel:+9647504045736" class="phone-radar">
        <span style="direction: ltr;">0750 404 5736</span>
    </a>

    <div class="social-row">
        <a href="https://wa.me/9647504045736" class="icon-circle"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="#" class="icon-circle"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" class="icon-circle"><i class="fa-brands fa-tiktok"></i></a>
        <a href="#" class="icon-circle"><i class="fa-brands fa-snapchat"></i></a>
        <a href="#" class="icon-circle"><i class="fa-solid fa-location-dot"></i></a>
    </div>

    <div class="tagline">Powering Your Digital Presence • 2026</div>
</div>

</body>
</html>
